
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Donations - Food Waste Management</title>
    <link rel="stylesheet" href="style.css">
<style>
/* General styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

/* Sidebar */
.sidebar {
    width: 250px;
    height: 100vh;
    background-color: #2c3e50;
    color: white;
    position: fixed;
    padding: 20px;
}

.sidebar .logo h2 {
    color: #ecf0f1;
    margin-bottom: 30px;
    text-align: center;
}

.sidebar ul.nav {
    list-style: none;
    padding: 0;
}

.sidebar ul.nav li {
    margin: 20px 0;
}

.sidebar ul.nav li a {
    color: #ecf0f1;
    text-decoration: none;
    font-size: 18px;
    display: block;
    padding: 10px;
    border-radius: 4px;
    transition: background 0.3s;
}

.sidebar ul.nav li a:hover {
    background-color: #34495e;
}

.sidebar ul.nav li a.active {
    background-color: #06C167;
}

/* Main Content */
.main-content {
    margin-left: 250px;
    padding: 30px;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.header-title h1 {
    color: #2c3e50;
}



.main-content {
            flex: 1;
            padding: 20px;
            background: white;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #34495e;
            color: white;
            padding: 15px;
            border-radius: 5px;
        }
        .dashboard-cards {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .card {
            flex: 1;
            background: #1abc9c;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
</style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <h2>Food Donate <br>User</h2>
        </div>
        <ul class="nav">
            <li><a href="{{ url_for('user_dashboard') }}" class="active">Dashboard</a></li>
            <li><a href="{{ url_for('donate') }}" >Donations</a></li>
            <li><a href="{{ url_for('view_request')}}">View Request</a></li>
            <li><a href="{{ url_for('home')}}">Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h1>Dashboard</h1>
            <p>Welcome, User</p>
        </div>
        <div class="dashboard-cards">
            <div class="card">
                <h3>Total Donations</h3>
                <p>15</p>  

            </div>
            <div class="card">
                <h3>Accept Requests</h3>
                <p>2</p>
            </div>
            <div class="card">
                <h3>Verified Users</h3>
                <p>150</p>
            </div>
        </div>
        
    </div>

</body>
</html>
